name: OIDC audience targeted

on:
  workflow_dispatch:
    inputs:
      case_regex:
        description: Optional JavaScript regular expression used to filter case IDs.
        required: false
        default: ""
      modes:
        description: "Comma-separated request modes: toolkit,urlsearchparams,raw."
        required: false
        default: toolkit,urlsearchparams,raw
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  targeted-audience:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        # actions/checkout v5
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Run targeted audience probes
        shell: bash
        env:
          CASE_REGEX_INPUT: ${{ github.event.inputs.case_regex }}
          REQUEST_MODES: ${{ github.event.inputs.modes || 'toolkit,urlsearchparams,raw' }}
        run: |
          DEFAULT_CASE_REGEX="^(github-root-https-port-443|github-owner-https-port-443|github-repo-https-port-443|github-repo-https-port-8443|github-owner-userinfo|github-app-userinfo|github-owner-trailing-dot-host|github-app-trailing-dot-host|github-owner-ftp-scheme|github-app-ftp-scheme|github-app-encoded-host-u|github-app-encoded-host-g|github-owner-encoded-host-u|github-app-bare-encoded-host-u|ssh-url-current-repo-no-git-suffix|ssh-url-current-owner|ssh-url-github-app)$"
          CASE_REGEX="${CASE_REGEX_INPUT:-$DEFAULT_CASE_REGEX}"
          node scripts/run-audience-matrix.mjs \
            --outputDir oidc-audience-results-targeted \
            --caseRegex "$CASE_REGEX" \
            --modes "$REQUEST_MODES"

      - name: Upload results
        if: always()
        # actions/upload-artifact v4
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: oidc-audience-results-targeted
          path: oidc-audience-results-targeted
          if-no-files-found: error
